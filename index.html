<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Charla — Spanish flashcards</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Yeseva+One&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg-base: #fff1d6;
  --bg-deep: #ffd8a3;
  --paper: #fffaf0;
  --ink: #1f1208;
  --ink-soft: #6b4a2e;
  --muted: #a78a66;
  --terracotta: #d2542e;
  --terracotta-deep: #a8401f;
  --marigold: #f4a300;
  --marigold-deep: #d18800;
  --hibiscus: #d63558;
  --jade: #2f8f5a;
  --jade-deep: #1f6440;
  --jade-soft: #c5e2cf;
  --indigo: #364fa6;
  --gold: #c89236;
  --cream: #fff8e8;
  --rojo-soft: #f9d6cc;
  --repaso: #b04a8c;
  --repaso-deep: #813767;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
body {
  font-family: 'Inter', sans-serif;
  background:
    radial-gradient(ellipse at 50% 0%, #ffd5a0 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, #ffb89a 0%, transparent 55%),
    radial-gradient(ellipse at 0% 60%, #ffe0c0 0%, transparent 50%),
    var(--bg-base);
  background-attachment: fixed;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }

/* DECORATIVE BACKGROUND ELEMENTS */
.bg-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.sombrero {
  position: absolute;
  width: 240px;
  height: 140px;
  opacity: 0.12;
}
.sombrero-1 { top: 10%; left: -60px; transform: rotate(-12deg); }
.sombrero-2 { bottom: 14%; right: -70px; transform: rotate(8deg); width: 200px; height: 115px; }
.cactus {
  position: absolute;
  width: 70px;
  height: 110px;
  opacity: 0.13;
}
.cactus-1 { top: 28%; right: 3%; }
.cactus-2 { bottom: 6%; left: 5%; transform: scaleX(-1); }
.motif {
  position: absolute;
  opacity: 0.11;
  pointer-events: none;
}
.motif-chili { width: 60px; height: 100px; top: 45%; left: 2%; transform: rotate(-18deg); }
.motif-maracas { width: 110px; height: 110px; top: 55%; right: 4%; transform: rotate(8deg); }
.motif-agave { width: 90px; height: 90px; bottom: 35%; right: 8%; opacity: 0.10; }
.sun-rays {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: conic-gradient(
    from 0deg,
    transparent 0deg, rgba(244, 163, 0, 0.15) 5deg, transparent 12deg,
    transparent 25deg, rgba(244, 163, 0, 0.15) 30deg, transparent 37deg,
    transparent 50deg, rgba(244, 163, 0, 0.15) 55deg, transparent 62deg,
    transparent 75deg, rgba(244, 163, 0, 0.15) 80deg, transparent 87deg,
    transparent 100deg, rgba(244, 163, 0, 0.15) 105deg, transparent 112deg,
    transparent 125deg, rgba(244, 163, 0, 0.15) 130deg, transparent 137deg,
    transparent 150deg, rgba(244, 163, 0, 0.15) 155deg, transparent 162deg,
    transparent 175deg, rgba(244, 163, 0, 0.15) 180deg, transparent 187deg,
    transparent 200deg, rgba(244, 163, 0, 0.15) 205deg, transparent 212deg,
    transparent 225deg, rgba(244, 163, 0, 0.15) 230deg, transparent 237deg,
    transparent 250deg, rgba(244, 163, 0, 0.15) 255deg, transparent 262deg,
    transparent 275deg, rgba(244, 163, 0, 0.15) 280deg, transparent 287deg,
    transparent 300deg, rgba(244, 163, 0, 0.15) 305deg, transparent 312deg,
    transparent 325deg, rgba(244, 163, 0, 0.15) 330deg, transparent 337deg,
    transparent 350deg, rgba(244, 163, 0, 0.15) 355deg, transparent 360deg);
  border-radius: 50%;
  animation: rotateSlow 180s linear infinite;
}
@keyframes rotateSlow {
  from { transform: translateX(-50%) rotate(0deg); }
  to { transform: translateX(-50%) rotate(360deg); }
}

.app-root {
  max-width: 880px;
  margin: 0 auto;
  padding: 24px 20px 80px;
  position: relative;
  min-height: 100vh;
  z-index: 1;
}

/* PAPEL PICADO bunting */
.papel-picado {
  position: absolute;
  top: 8px; left: 0; right: 0;
  height: 28px;
  background-image:
    linear-gradient(135deg, var(--terracotta) 25%, transparent 25%),
    linear-gradient(225deg, var(--terracotta) 25%, transparent 25%),
    linear-gradient(135deg, var(--marigold) 25%, transparent 25%),
    linear-gradient(225deg, var(--marigold) 25%, transparent 25%),
    linear-gradient(135deg, var(--jade) 25%, transparent 25%),
    linear-gradient(225deg, var(--jade) 25%, transparent 25%),
    linear-gradient(135deg, var(--hibiscus) 25%, transparent 25%),
    linear-gradient(225deg, var(--hibiscus) 25%, transparent 25%),
    linear-gradient(135deg, var(--indigo) 25%, transparent 25%),
    linear-gradient(225deg, var(--indigo) 25%, transparent 25%);
  background-size: 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px, 24px 28px;
  background-position: 0 0, 12px 0, 48px 0, 60px 0, 96px 0, 108px 0, 144px 0, 156px 0, 192px 0, 204px 0;
  background-repeat: repeat-x;
  opacity: 0.9;
  z-index: 0;
  -webkit-mask: linear-gradient(180deg, transparent 0%, black 60%, black 100%);
          mask: linear-gradient(180deg, transparent 0%, black 60%, black 100%);
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-top: 36px;
  position: relative;
  z-index: 1;
}
.header-mark { display: flex; align-items: center; gap: 12px; }
.logo-icon { position: relative; width: 48px; height: 38px; flex-shrink: 0; }
.logo-icon svg { width: 100%; height: 100%; }
.mark-text {
  font-family: 'Yeseva One', serif;
  font-size: 32px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.sync-indicator {
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 50px;
  border: 1.5px solid var(--ink);
  white-space: nowrap;
}
.sync-synced { background: var(--jade-soft); color: var(--jade-deep); }
.sync-syncing { background: var(--bg-deep); color: var(--marigold-deep); }
.sync-offline { background: var(--cream); color: var(--muted); }

.header-session {
  display: flex; align-items: center; gap: 8px;
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 14px;
  background: var(--cream);
  padding: 8px 14px;
  border: 2.5px solid var(--ink);
  border-radius: 100px;
  box-shadow: 3px 3px 0 0 var(--ink);
  white-space: nowrap;
}
.session-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--terracotta);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

main { position: relative; z-index: 1; }

/* HERO */
.hero-card {
  position: relative;
  background: var(--cream);
  border: 3px solid var(--ink);
  border-radius: 8px;
  padding: 50px 36px 44px;
  box-shadow: 8px 8px 0 0 var(--ink);
  margin-bottom: 28px;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 16px;
  background: repeating-linear-gradient(90deg,
    var(--terracotta) 0 14px, var(--marigold) 14px 28px,
    var(--hibiscus) 28px 42px, var(--jade) 42px 56px,
    var(--indigo) 56px 70px);
  border-bottom: 2px solid var(--ink);
}
.hero-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 8px;
  background: repeating-linear-gradient(90deg,
    var(--gold) 0 12px, transparent 12px 24px);
  border-top: 2px solid var(--ink);
}
.hero-sticker {
  position: absolute;
  font-family: 'Bungee', sans-serif;
  font-size: 13px;
  padding: 8px 16px;
  border: 2.5px solid var(--ink);
  border-radius: 50px;
  z-index: 3;
  box-shadow: 3px 3px 0 0 var(--ink);
}
.hero-sticker-tl {
  top: 36px; right: 24px;
  background: var(--terracotta); color: var(--cream);
  transform: rotate(-6deg);
}
.hero-sticker-br {
  bottom: 32px; right: 32px;
  background: var(--jade); color: var(--cream);
  transform: rotate(5deg);
}
.hero-eyebrow {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 16px;
  color: var(--terracotta);
  margin-bottom: 12px;
  display: inline-flex; align-items: center; gap: 10px;
}
.hero-eyebrow::before, .hero-eyebrow::after {
  content: ''; width: 24px; height: 1.5px; background: var(--terracotta);
}
.hero-title {
  font-family: 'Yeseva One', serif;
  font-size: clamp(48px, 9vw, 64px);
  line-height: 0.95;
  color: var(--ink);
  margin-bottom: 18px;
}
.hero-title em { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--terracotta); }
.hero-dot { color: var(--marigold); }
.hero-sub {
  font-size: 17px; color: var(--ink-soft);
  margin-bottom: 28px; line-height: 1.5;
  font-style: italic; max-width: 480px;
}
.btn-primary {
  font-family: 'Yeseva One', serif;
  font-size: 17px;
  background: var(--terracotta); color: var(--cream);
  border: 2.5px solid var(--ink);
  padding: 14px 28px;
  border-radius: 50px;
  box-shadow: 4px 4px 0 0 var(--ink);
  display: inline-flex; align-items: center; gap: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.01em;
}
.btn-primary:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 0 var(--ink);
  background: var(--hibiscus);
}
.btn-primary:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 0 var(--ink);
}
.btn-arrow { font-family: 'DM Serif Display', serif; font-style: italic; font-size: 22px; transition: transform 0.2s; }
.btn-primary:hover .btn-arrow { transform: translateX(4px); }
.btn-small { padding: 10px 22px; font-size: 15px; }

.btn-link {
  background: none; border: none; cursor: pointer;
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px; color: var(--ink-soft);
  text-decoration: underline;
  text-decoration-color: var(--terracotta);
  text-decoration-thickness: 1.5px;
  text-underline-offset: 4px;
  padding: 4px 0;
}
.btn-link:hover { color: var(--terracotta); }

/* FLAG button on wrong-answer */
.card-action-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.btn-flag {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 14px;
  background: var(--cream);
  color: var(--ink-soft);
  border: 2px dashed var(--muted);
  padding: 10px 18px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-flag:hover:not(:disabled) {
  background: var(--marigold);
  color: var(--ink);
  border-color: var(--ink);
  border-style: solid;
}
.btn-flag.flagged, .btn-flag:disabled {
  background: var(--jade-soft);
  color: var(--jade-deep);
  border-color: var(--jade);
  border-style: solid;
  cursor: default;
}

/* PRE-SESSION POPUP */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(31, 18, 8, 0.55);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--cream);
  border: 3px solid var(--ink);
  border-radius: 12px;
  padding: 28px;
  max-width: 440px;
  width: 100%;
  box-shadow: 8px 8px 0 0 var(--ink);
  position: relative;
  overflow: hidden;
  animation: popIn 0.25s ease;
}
@keyframes popIn { from { transform: scale(0.95); } to { transform: scale(1); } }
.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 10px;
  background: repeating-linear-gradient(90deg,
    var(--terracotta) 0 14px, var(--marigold) 14px 28px,
    var(--hibiscus) 28px 42px, var(--jade) 42px 56px,
    var(--indigo) 56px 70px);
  border-bottom: 2px solid var(--ink);
}
.modal-title {
  font-family: 'Yeseva One', serif;
  font-size: 28px;
  margin-top: 18px;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.modal-subtitle {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  color: var(--ink-soft);
  margin-bottom: 22px;
}
.modal-section {
  margin-bottom: 22px;
}
.modal-section-label {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  color: var(--terracotta);
  margin-bottom: 10px;
  display: block;
}
.gender-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.gender-btn {
  font-family: inherit;
  font-size: 15px;
  padding: 12px 14px;
  background: var(--cream);
  border: 2.5px solid var(--ink);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.15s ease;
  color: var(--ink);
  font-weight: 600;
}
.gender-btn:hover { background: var(--bg-deep); }
.gender-btn.active {
  background: var(--marigold);
  box-shadow: 3px 3px 0 0 var(--ink);
  transform: translate(-1px, -1px);
}
.range-row {
  display: flex; align-items: center; gap: 14px;
}
.range-row input[type="range"] {
  flex: 1;
  accent-color: var(--terracotta);
}
.range-value {
  font-family: 'Yeseva One', serif;
  font-size: 28px;
  color: var(--terracotta);
  min-width: 70px;
  text-align: right;
}
.range-value-suffix {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 16px;
  color: var(--ink-soft);
}
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  flex-wrap: wrap;
}
.modal-actions .btn-link { padding: 14px 18px; }

/* STATS — now 3 buckets: Aprendidas / Aprendiendo / Repaso */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 28px;
}
.stat-card {
  background: var(--cream);
  border: 2.5px solid var(--ink);
  border-radius: 8px;
  padding: 22px 20px 18px;
  box-shadow: 4px 4px 0 0 var(--ink);
  position: relative; overflow: hidden;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s ease;
  display: flex; flex-direction: column; gap: 4px;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 6px;
}
.stat-aprendidas::before { background: var(--jade); }
.stat-aprendiendo::before { background: var(--marigold); }
.stat-repaso::before { background: var(--repaso); }
.stat-card:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 0 var(--ink);
}
.stat-emoji {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Yeseva One', serif;
  font-size: 18px; font-weight: 800;
  margin-bottom: 8px; margin-top: 6px;
  color: var(--cream);
}
.stat-aprendidas .stat-emoji { background: var(--jade); }
.stat-aprendiendo .stat-emoji { background: var(--marigold); color: var(--ink); }
.stat-repaso .stat-emoji { background: var(--repaso); }
.stat-num {
  font-family: 'Yeseva One', serif;
  font-size: 48px; line-height: 1;
  color: var(--ink);
  letter-spacing: -0.03em;
}
.stat-aprendidas .stat-num { color: var(--jade-deep); }
.stat-aprendiendo .stat-num { color: var(--marigold-deep); }
.stat-repaso .stat-num { color: var(--repaso-deep); }
.stat-label {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 18px; margin-top: 2px;
  color: var(--ink);
}
.stat-label-en {
  font-size: 12px; color: var(--ink-soft);
  font-weight: 500;
}
.stat-tap { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

/* PHRASES */
.phrases-panel {
  background: var(--cream);
  border: 2.5px solid var(--ink);
  border-radius: 8px;
  padding: 28px 22px 22px;
  box-shadow: 4px 4px 0 0 var(--ink);
  margin-bottom: 24px;
  position: relative;
}
.phrases-panel::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 8px;
  background: repeating-linear-gradient(90deg,
    var(--marigold) 0 10px, var(--gold) 10px 20px);
  border-bottom: 2px solid var(--ink);
}
.phrases-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.phrases-badge {
  font-family: 'Bungee', sans-serif;
  font-size: 11px;
  background: var(--marigold);
  border: 2px solid var(--ink);
  padding: 4px 12px;
  border-radius: 50px;
  color: var(--ink);
}
.phrases-count { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--ink-soft); font-size: 15px; }
.phrases-list { display: flex; flex-wrap: wrap; gap: 10px; }
.phrase-chip {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: var(--bg-deep);
  border: 1.5px solid var(--ink);
  border-radius: 50px;
  font-size: 15px;
}
.phrase-es { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--terracotta); }
.phrase-arrow { color: var(--marigold-deep); font-weight: 700; }
.phrase-en { color: var(--ink-soft); }
.home-footer { text-align: center; margin-top: 36px; }

/* STUDY VIEW */
.study { animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.study-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 12px;
}
.study-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.study-pill {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  background: var(--cream);
  border: 2px solid var(--ink);
  padding: 6px 14px;
  border-radius: 50px;
  box-shadow: 2px 2px 0 0 var(--ink);
  color: var(--ink);
}
.study-progress { display: flex; gap: 5px; }
.pip {
  width: 24px; height: 8px;
  background: var(--bg-deep);
  border: 1.5px solid var(--ink);
  border-radius: 50px;
  transition: all 0.3s ease;
}
.pip.pip-done { background: var(--jade); }
.pip.pip-active {
  background: var(--terracotta);
  animation: pulsePip 1.5s ease-in-out infinite;
}
@keyframes pulsePip { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

.card {
  background: var(--cream);
  border: 3px solid var(--ink);
  border-radius: 12px;
  padding: 48px 32px 36px;
  box-shadow: 8px 8px 0 0 var(--ink);
  position: relative;
  min-height: 380px;
  display: flex; flex-direction: column;
  transition: all 0.25s ease;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 10px;
  background: repeating-linear-gradient(90deg,
    var(--terracotta) 0 14px, var(--marigold) 14px 28px,
    var(--jade) 28px 42px, var(--indigo) 42px 56px,
    var(--hibiscus) 56px 70px);
  border-bottom: 2px solid var(--ink);
  border-radius: 9px 9px 0 0;
}
.card-correct { background: #dff5e3; box-shadow: 8px 8px 0 0 var(--jade); }
.card-wrong { background: #fde7e0; box-shadow: 8px 8px 0 0 var(--terracotta); animation: shake 0.4s ease; }
@keyframes shake {
  0%, 100% { transform: translate(0, 0); }
  20%, 60% { transform: translate(-6px, 0); }
  40%, 80% { transform: translate(6px, 0); }
}
.card-stage-tag {
  position: absolute;
  top: -16px; left: 24px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--marigold);
  border: 2.5px solid var(--ink);
  padding: 6px 14px;
  border-radius: 50px;
  font-family: 'Yeseva One', serif;
  font-size: 13px;
  box-shadow: 2px 2px 0 0 var(--ink);
  z-index: 5;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.stage-num {
  background: var(--ink);
  color: var(--marigold);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 50px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 0;
}
.card-prompt-label {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 16px;
  color: var(--terracotta);
  margin-bottom: 20px;
  margin-top: 4px;

}
.card-prompt-text {

.card-form { display: flex; gap: 10px; margin-top: auto; }

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.feedback-mark {

}
.feedback-correct .feedback-mark { background: var(--jade); color: var(--cream); }
.feedback-wrong .feedback-mark { background: var(--terracotta); color: var(--cream); }
.feedback-text { font-family: 'Yeseva One', serif; font-size: 26px; margin-bottom: 16px; }
.wrong-block {

}
.wrong-row {

}

.wrong-label {

}

.wrong-value.strong { font-family: 'Yeseva One', serif; font-size: 18px; font-weight: normal; }

.wrong-en { display: block; color: var(--ink-soft); font-size: 14px; }

/* DONE */
.done {
  text-align: center;
  padding: 60px 20px;
  animation: pop 0.5s ease;
  position: relative;
}
@keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
.done-confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.confetti {
  position: absolute;
  width: 14px; height: 14px;
  animation: fall 3s ease-out infinite;
  border: 1.5px solid var(--ink);
}
.confetti:nth-child(12n+1) { left: 10%; background: var(--terracotta); animation-delay: 0s; transform: rotate(15deg); }
.confetti:nth-child(12n+2) { left: 20%; background: var(--marigold); animation-delay: 0.3s; transform: rotate(-25deg); border-radius: 50%; }
.confetti:nth-child(12n+3) { left: 30%; background: var(--jade); animation-delay: 0.5s; transform: rotate(45deg); }
.confetti:nth-child(12n+4) { left: 40%; background: var(--indigo); animation-delay: 0.7s; border-radius: 50%; }
.confetti:nth-child(12n+5) { left: 50%; background: var(--hibiscus); animation-delay: 0.2s; transform: rotate(-15deg); }
.confetti:nth-child(12n+6) { left: 60%; background: var(--gold); animation-delay: 0.6s; border-radius: 50%; }
.confetti:nth-child(12n+7) { left: 70%; background: var(--terracotta); animation-delay: 0.8s; transform: rotate(25deg); }
.confetti:nth-child(12n+8) { left: 80%; background: var(--marigold); animation-delay: 0.4s; }
.confetti:nth-child(12n+9) { left: 90%; background: var(--jade); animation-delay: 0.9s; border-radius: 50%; }
.confetti:nth-child(12n+10) { left: 15%; background: var(--indigo); animation-delay: 1.1s; transform: rotate(35deg); }
.confetti:nth-child(12n+11) { left: 55%; background: var(--hibiscus); animation-delay: 1.3s; border-radius: 50%; }
.confetti:nth-child(12n) { left: 85%; background: var(--gold); animation-delay: 1.5s; transform: rotate(-45deg); }
@keyframes fall { 0% { top: -20px; opacity: 1; } 100% { top: 100%; opacity: 0; } }
.done-emoji {
  font-size: 80px;
  margin-bottom: 20px;
  display: inline-block;
  animation: wiggle 0.8s ease-in-out infinite;
}
@keyframes wiggle {
  0%, 100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}
.done-eyebrow {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 16px;
  color: var(--jade-deep);
  margin-bottom: 12px;
  display: inline-flex; align-items: center; gap: 10px;
}
.done-eyebrow::before, .done-eyebrow::after {
  content: ''; width: 24px; height: 1.5px; background: var(--jade-deep);
}
.done-title {

  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 18px;
  background: linear-gradient(135deg, var(--terracotta) 0%, var(--marigold) 50%, var(--hibiscus) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.done-sub {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 19px;
  color: var(--ink-soft);
  max-width: 460px;
  margin: 0 auto 28px;
  line-height: 1.5;
}
.done-stats {

  gap: 14px;
  justify-content: center;
  margin: 0 auto 32px;

  flex-wrap: wrap;
}
.done-stat {

}

}
.done-stat-num-aprendidas { color: var(--jade-deep); }
.done-stat-num-aprendiendo { color: var(--marigold-deep); }
.done-stat-num-repaso { color: var(--repaso-deep); }
.done-stat-label {

/* BUCKET */
.bucket { animation: fadeUp 0.3s ease; }
.bucket-header {

  color: var(--ink-soft);
  font-style: italic;
}
.rules-start-btn-wrap { text-align: center; padding-bottom: 20px; }

/* Confusiones study */
.confusion-study { animation: fadeUp 0.3s ease; }
.confusion-study-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.confusion-pair-label {
  font-family: 'Bungee', sans-serif;
  font-size: 13px;
  background: var(--indigo);
  color: white;
  border: 2px solid var(--ink);
  padding: 6px 14px;
  border-radius: 50px;
  box-shadow: 2px 2px 0 0 var(--ink);
  letter-spacing: 0.04em;
}
.confusion-score {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  color: var(--ink-soft);
}
.confusion-card-wrap {
  background: var(--cream);
  border: 3px solid var(--ink);
  border-radius: 12px;
  padding: 48px 32px 36px;
  box-shadow: 8px 8px 0 0 var(--indigo);
  position: relative;
  min-height: 420px;
  display: flex; flex-direction: column;
}
.confusion-card-wrap::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 10px;
  background: repeating-linear-gradient(90deg,
    var(--indigo) 0 14px, var(--terracotta) 14px 28px,
    var(--jade) 28px 42px, var(--marigold) 42px 56px);
  border-bottom: 2px solid var(--ink);
  border-radius: 9px 9px 0 0;
}
.confusion-card-wrap.confusion-correct { background: #dff5e3; box-shadow: 8px 8px 0 0 var(--jade); }
.confusion-card-wrap.confusion-wrong { background: #fde7e0; box-shadow: 8px 8px 0 0 var(--terracotta); animation: shake 0.4s ease; }

.confusion-prompt-label {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  color: var(--terracotta);
  margin-bottom: 18px;
  margin-top: 4px;
  display: inline-flex; align-items: center; gap: 8px;
}
.confusion-prompt-label::before, .confusion-prompt-label::after {
  content: ''; width: 12px; height: 1.5px; background: var(--terracotta);
}
.confusion-sentence {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: clamp(22px, 4vw, 32px);
  line-height: 1.35;
  color: var(--ink);
  margin-bottom: 28px;
  flex: 1;
}
.confusion-blank {
  font-family: 'Yeseva One', serif;
  font-style: normal;
  color: var(--indigo);
  border-bottom: 2.5px solid var(--indigo);
  padding: 0 6px;
  min-width: 60px;
  display: inline-block;
  text-align: center;
}
.confusion-form { display: flex; gap: 10px; }
.confusion-input {
  flex: 1;
  font-family: inherit;
  font-size: 18px;
  font-weight: 600;
  padding: 14px 20px;
  background: var(--bg-base);
  border: 2.5px solid var(--ink);
  color: var(--ink);
  outline: none;
  border-radius: 50px;
  transition: all 0.15s ease;
}
.confusion-input:focus { background: white; box-shadow: 3px 3px 0 0 var(--indigo); }
.confusion-input::placeholder { color: var(--muted); font-style: italic; }
.confusion-submit {
  font-family: 'Yeseva One', serif;
  font-size: 16px;
  padding: 14px 28px;
  background: var(--indigo);
  color: white;
  border: 2.5px solid var(--ink);
  cursor: pointer;
  border-radius: 50px;
  box-shadow: 3px 3px 0 0 var(--ink);
  transition: all 0.15s ease;
}
.confusion-submit:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 0 var(--ink); }

.confusion-feedback {
  margin-top: 22px;
  padding-top: 22px;
  border-top: 2px dashed var(--muted);
  animation: slideUp 0.3s ease;
}
.confusion-feedback-mark {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2.5px solid var(--ink);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 10px;
  box-shadow: 3px 3px 0 0 var(--ink);
}
.confusion-correct-mark { background: var(--jade); color: white; }
.confusion-wrong-mark { background: var(--terracotta); color: white; }
.confusion-feedback-text {
  font-family: 'Yeseva One', serif;
  font-size: 22px;
  margin-bottom: 10px;
}
.confusion-hint {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: 15px;
  color: var(--ink-soft);
  margin-bottom: 16px;
  line-height: 1.5;
}
.confusion-hint strong {
  color: var(--indigo);
  font-weight: 600;
  font-style: normal;
}

@media (max-width: 640px) {
  .confusion-cards-grid { grid-template-columns: 1fr; }
  .confusion-form { flex-direction: column; }
  .confusion-submit { width: 100%; }
}

const SUPABASE_URL = 'https://fpusffsmgsewolxmgtxq.supabase.co';

// User identity from URL ?u=... parameter.
// Falls back to 'me' if nothing's specified.
// Only allows safe alphanumeric + dash/underscore to keep db keys clean.
function getUserIdFromUrl() {
  try {
    const params = new URLSearchParams(window.location.search);
    const u = (params.get('u') || '').trim().toLowerCase();
    if (u && /^[a-z0-9_-]{1,40}$/.test(u)) return u;
  } catch {}
  return 'me';
}
const SYNC_ROW_ID = getUserIdFromUrl();

let sb = null;
let syncStatus = 'offline'; // 'synced' | 'syncing' | 'offline'
let syncTimer = null;

try {
  if (window.supabase && SUPABASE_URL) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
} catch (e) {
  console.warn('Supabase init failed:', e);
}

function updateSyncIndicator() {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  const labels = {
    synced: '● synced',
    syncing: '● syncing…',
    offline: '○ offline',
  };
  const status = labels[syncStatus] || '';
  // Show username if it's anything other than the default 'me'
  const userTag = SYNC_ROW_ID !== 'me' ? ` · ${SYNC_ROW_ID}` : '';
  el.textContent = status + userTag;
  el.className = 'sync-indicator sync-' + syncStatus;
}

async function syncDown() {
  if (!sb) return;
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    const { data, error } = await sb
      .from('charla_progress')
      .select('data, updated_at')
      .eq('id', SYNC_ROW_ID)
      .maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      const cloud = data.data;
      const cloudTs = cloud.updatedAt || new Date(data.updated_at).getTime();
      const localTs = state.updatedAt || 0;
      if (cloudTs > localTs) {
        // Cloud is newer — adopt it
        state = cloud;
        // Re-apply defaults in case cloud copy is missing newer fields
        if (!state.thisSessionWrongs) state.thisSessionWrongs = {};
        if (!state.userSynonyms) state.userSynonyms = {};
        if (!state.flaggedLog) state.flaggedLog = [];
        if (state.gender === undefined) state.gender = null;
        if (state.aprendiendoCount === undefined) state.aprendiendoCount = 5;
        saveState(state);
        renderHome();
      }
    }
    syncStatus = 'synced';
  } catch (e) {
    console.warn('Sync down failed:', e?.message || e, e);
    syncStatus = 'offline';
  }
  updateSyncIndicator();
}

async function syncUp() {
  if (!sb) return;
  syncStatus = 'syncing';
  updateSyncIndicator();
  try {
    const { error } = await sb
      .from('charla_progress')
      .upsert({ id: SYNC_ROW_ID, data: state, updated_at: new Date().toISOString() }, { onConflict: 'id' });
    if (error) throw error;
    syncStatus = 'synced';
  } catch (e) {
    console.warn('Sync up failed:', e?.message || e, e);
    syncStatus = 'offline';
  }
  updateSyncIndicator();
}

function scheduleSyncUp() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncUp(); }, 2000);
}

  "youd": "you would", "you'd": "you would",
  "hes": "he is", "he's": "he is",
  "shes": "she is", "she's": "she is",
  "its": "it is", "it's": "it is",
  "were": "we are", "we're": "we are",
  "weve": "we have", "we've": "we have",
  "theyre": "they are", "they're": "they are",

  "isnt": "is not", "isn't": "is not",
  "arent": "are not", "aren't": "are not",
  "wasnt": "was not", "wasn't": "was not",
  "werent": "were not", "weren't": "were not",
  "dont": "do not", "don't": "do not",
  "doesnt": "does not", "doesn't": "does not",

  "havent": "have not", "haven't": "have not",

  "cant": "can not", "can't": "can not", "cannot": "can not",

  "wouldnt": "would not", "wouldn't": "would not",
  "shouldnt": "should not", "shouldn't": "should not",

function expandContractions(text) {
  // Replace any contraction tokens
  return text.split(' ').map(w => CONTRACTIONS[w] || w).join(' ');
}

// UK/US spelling and word pairs — normalize both to a canonical form.
// Applied AFTER contractions so we work on whole words.
// Also includes common English synonyms that should be accepted interchangeably
// (so "I want to ask the professor" matches "I want to ask the teacher").
const UK_US_NORM = {

  centre: 'center', theatre: 'theater', metre: 'meter', litre: 'liter',
  travelling: 'traveling', travelled: 'traveled', cancelled: 'canceled',
  grey: 'gray',
  // UK words → US equivalents (canonical = US since en strings are US-flavored)
  lift: 'elevator', flat: 'apartment', biscuit: 'cookie',
  lorry: 'truck', motorway: 'highway', petrol: 'gas',
  queue: 'line', rubbish: 'trash', bin: 'trash',
  trousers: 'pants', jumper: 'sweater', trainers: 'sneakers',
  pavement: 'sidewalk', autumn: 'fall', holiday: 'vacation',
  chemist: 'pharmacy', shop: 'store',
  // English synonyms — normalise to one canonical form on both sides
  present: 'gift',
  professor: 'teacher',
  film: 'movie', films: 'movies', cinema: 'movies',
  hi: 'hello', hey: 'hello',
  yeah: 'yes', yep: 'yes', yup: 'yes',
  nope: 'no',
  cheers: 'thanks', thx: 'thanks',
  bye: 'goodbye', farewell: 'goodbye',
  sorry: 'apologies',
  buddy: 'friend', pal: 'friend', mate: 'friend',

  lady: 'woman',
  puppy: 'dog', doggy: 'dog', doggie: 'dog',
  kitty: 'cat', kitten: 'cat',
  store: 'shop',  // careful: 'shop' is the UK form we mapped above to 'store' — this would loop. Remove this one.
  // (removed shop/store circular)
  auto: 'car', automobile: 'car', vehicle: 'car',
  road: 'street',
  ocean: 'sea',
  pretty: 'cute', lovely: 'cute',
  tasty: 'delicious', yummy: 'delicious',
  exhausted: 'tired', sleepy: 'tired', weary: 'tired',
  glad: 'happy', joyful: 'happy', cheerful: 'happy',
  unhappy: 'sad', down: 'sad',
  simple: 'easy',
  difficult: 'hard', tough: 'hard',

// Fix the circular shop/store: remove the override (shop UK→store already maps shop→store)
delete UK_US_NORM.store;

function applyUkUsNorm(text) {
  return text.split(' ').map(w => UK_US_NORM[w] || w).join(' ');
}

const normalize = (s) => {
  let result = s.toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')      // strip accents
    .replace(/\s*\([^)]*\)\s*/g, ' ')      // strip parentheticals
    .replace(/[¿?¡!.,;:()"]/g, '')          // strip most punctuation (keep apostrophes for now)
    .replace(/^to\s+/, '')
    .replace(/\s+/g, ' ')
    .trim();
  // Expand contractions for matching
  result = expandContractions(result);
  // Now strip remaining apostrophes (in case any leaked through)
  result = result.replace(/'/g, '').replace(/\s+/g, ' ').trim();
  // Map UK spellings/words → US canonical
  result = applyUkUsNorm(result);
  return result;
};

const levenshtein = (a, b) => {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const dp = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i - 1][j] + 1, dp[i][j - 1] + 1, dp[i - 1][j - 1] + cost);
    }
  }
  return dp[a.length][b.length];
};

// Lookup user-added synonyms for a normalized target
function getUserSynonyms(target) {
  // We index by the normalized canonical target string.
  // Target may have multiple alternates "x/y" — we check each.
  const keys = target.split(/[\/,]/).map(t => normalize(t.trim())).filter(Boolean);
  const out = [];
  for (const k of keys) {
    if (state.userSynonyms && state.userSynonyms[k]) {
      out.push(...state.userSynonyms[k]);
    }
  }
  return out;
}

const sentenceMatch = (input, target) => {
  const a = normalize(input);
  const t = normalize(target);
  if (a === t) return true;
  const tolerance = Math.min(3, Math.max(1, Math.floor(t.length / 12)));
  if (levenshtein(a, t) <= tolerance) return true;
  // Also try user synonyms (e.g. they may have flagged a whole sentence variant)
  const userSyns = getUserSynonyms(target);
  for (const s of userSyns) {
    const sn = normalize(s);
    if (a === sn) return true;
    if (levenshtein(a, sn) <= tolerance) return true;
  }
  return false;
};

// Word matching: takes the target string AND optional list of synonyms
// Returns true if input matches target OR any synonym (including user-added)
const isWordCorrect = (input, target, synonyms = []) => {
  const a = normalize(input);
  if (!a) return false;
  const userSyns = getUserSynonyms(target);
  const candidates = [
    ...target.split(/[\/,]/).map(t => t.trim()),
    ...synonyms,
    ...userSyns,
  ].map(t => normalize(t)).filter(Boolean);
  for (const t of candidates) {
    if (a === t) return true;
    if (levenshtein(a, t) <= 1) return true;
    if (a.length >= 3 && t.length >= 3) {
      const aWords = a.split(' ');
      const tWords = t.split(' ');
      if (aWords.some(w => w.length >= 3 && tWords.includes(w))) return true;
      if (tWords.some(w => w.length >= 3 && aWords.includes(w))) return true;
    }
  }
  return false;
};

const isCorrect = (input, target, kind, synonyms) => {
  if (kind === 'sentence') return sentenceMatch(input, target);
  return isWordCorrect(input, target, synonyms);
};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// Frequency-weighted sample without replacement.
// `pool` is assumed to be already ordered by frequency (index 0 = most common).
// Common words are much more likely to be picked, but any word can surface.
const weightedSampleByRank = (items, getOriginalRank, n) => {
  // Build weights using 1 / (rank+1)^0.7 — a moderate power law.
  // rank+1 so the most-common word doesn't have infinite weight.
  const remaining = [...items];
  const result = [];
  while (result.length < n && remaining.length > 0) {
    const weights = remaining.map(w => 1 / Math.pow(getOriginalRank(w) + 1, 0.7));
    const totalWeight = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalWeight;
    let pickedIdx = 0;
    for (let i = 0; i < weights.length; i++) {
      r -= weights[i];
      if (r <= 0) { pickedIdx = i; break; }
    }
    result.push(remaining[pickedIdx]);
    remaining.splice(pickedIdx, 1);
  }
  return result;
};

const pickSessionWords = (pool, n, alreadyUsed) => {
  // pool is ordered by frequency. Capture each word's original rank by its index.
  const rankByEs = {};
  pool.forEach((w, i) => { rankByEs[w.es] = i; });

  const available = pool.filter(w => !alreadyUsed.has(w.es));
  // Weighted-sample more than we need so the category filter has room
  const sampleSize = Math.min(available.length, n * 3);
  const candidates = weightedSampleByRank(available, w => rankByEs[w.es], sampleSize);

  const picked = [];
  const catCount = {};
  const typeCount = {};
  for (const w of candidates) {
    if (picked.length >= n) break;
    if ((catCount[w.cat] || 0) >= 2) continue;
    if ((typeCount[w.type] || 0) >= 3) continue;
    picked.push(w);
    catCount[w.cat] = (catCount[w.cat] || 0) + 1;
    typeCount[w.type] = (typeCount[w.type] || 0) + 1;
  }
  // If category filter blocked us from reaching n, fill from remaining candidates
  if (picked.length < n) {
    for (const w of candidates) {
      if (picked.length >= n) break;
      if (picked.find(p => p.es === w.es)) continue;
      picked.push(w);
    }
  }
  // If still short (very small pool), top up from anywhere in available
  if (picked.length < n) {
    for (const w of available) {
      if (picked.length >= n) break;
      if (picked.find(p => p.es === w.es)) continue;
      picked.push(w);
    }
  }
  return picked;
};

//
// CARD SHAPE:
//   {
//     es, en, cat, type,
//     bucket: 'aprendiendo' | 'aprendidas' | 'repaso',

//     cleanStreakSessions: number,         // for promotion to aprendidas (need 2 in a row)

// Promotion rules (run at end of session):
//   - For each card in the pack:
//       - If wrong >= 2 times this session → repaso

//           - cleanStreakSessions += 1
//           - if cleanStreakSessions >= 2 → aprendidas
//       - Else: cleanStreakSessions = 0

  flaggedLog: [],

function escapeHtml(s) {

}

function getCleanEnglish(en) {
  return en.replace(/\s*\([^)]*\)\s*/g, '').split('/')[0].trim();

function getBucketCounts() {

  for (const c of Object.values(state.cards)) {

  }
  return counts;
}

function exportFlaggedAnswers() {
  if (!state.flaggedLog || state.flaggedLog.length === 0) return;

    lines.push(`---`);
    lines.push(`Session ${f.session} · ${f.kind}`);
    lines.push(`Spanish: ${f.es}  (${f.en})`);
    lines.push(`Target:  ${f.target}`);
    lines.push(`I typed: ${f.userAnswer}`);
    lines.push('');
  }
  const text = lines.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `charla-flags-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function actuallyStartSession(aprendiendoCount) {
  // Build a new pack
  const usedEs = new Set(Object.keys(state.cards));
  const newWords = pickSessionWords(WORD_POOL, 10, usedEs);
  for (const w of newWords) {
    state.cards[w.es] = {
      es: w.es, en: w.en, cat: w.cat, type: w.type,
      bucket: 'aprendiendo',
      introducedSession: state.session,
      cleanStreakSessions: 0,
      lastSessionReviewed: 0,
    };
  }

  // Last session's cards (if any)
  const prevSessionCards = Object.values(state.cards)
    .filter(c => c.introducedSession === state.session - 1)
    .map(c => c.es);

  // Pick N from aprendiendo (excluding prev session) + ALL repaso cards
  const learningPool = Object.values(state.cards)
    .filter(c => c.bucket === 'aprendiendo' && !prevSessionCards.includes(c.es) && !newWords.find(n => n.es === c.es))
    .map(c => c.es);
  const learningPick = shuffle(learningPool).slice(0, aprendiendoCount);

  const repasoCards = Object.values(state.cards)
    .filter(c => c.bucket === 'repaso')
    .map(c => c.es);

  const allPack = new Set([
    ...newWords.map(w => w.es),
    ...prevSessionCards,
    ...learningPick,
    ...repasoCards,
  ]);
  state.todayPack = shuffle([...allPack]);
  state.todayCompleted = [];
  state.thisSessionWrongs = {};
  persist();
  initStudy();
  renderStudy();
}

// ----- STUDY -----
function initStudy() {
  const remaining = state.todayPack.filter(es => !state.todayCompleted.includes(es));
  const stagesRemaining = {};
  for (const es of remaining) {
    stagesRemaining[es] = [0, 1, 2, 3];
  }
  study = {
    queue: shuffle(remaining),
    stagesRemaining,
    currentEs: null,
    stage: 0,
    feedback: null,
    showWrongDetails: false,
    inputValue: '',
  };
  pickNext();
}

function pickNext() {
  if (!study) return;
  let i = 0;
  while (i < study.queue.length) {
    const candidate = study.queue[i];
    const stages = study.stagesRemaining[candidate];
    if (stages && stages.length > 0) {
      study.queue.splice(i, 1);
      study.currentEs = candidate;
      // Pick the LOWEST remaining stage so we go in order per card
      study.stage = stages[0];
      study.feedback = null;
      study.showWrongDetails = false;
      study.inputValue = '';
      return;
    }
    i++;
  }
  study.currentEs = null;
}

function renderStudy() {
  if (!study) return;
  if (!study.currentEs) {
    renderDone();
    return;
  }
  const word = getWord(study.currentEs);
  if (!word) {
    pickNext();
    if (study.currentEs) renderStudy(); else renderDone();
    return;
  }
  const stage = study.stage;
  const stageInfo = STAGES[stage];

  // Pick the Spanish sentence variant based on user's gender preference
  const sentenceEs = (state.gender === 'fem' && word.sentenceEsF) ? word.sentenceEsF : word.sentenceEs;

        <button class="btn-link" id="exitBtn">← Salir</button>
        <div class="study-meta">
          <div class="study-pill">${wordsRemaining} palabra${wordsRemaining !== 1 ? 's' : ''} restante${wordsRemaining !== 1 ? 's' : ''}</div>
          <div class="study-progress">
            ${[0,1,2,3].map(i => {
              let cls = 'pip';
              if (i < stage) cls += ' pip-done';
              if (i === stage) cls += ' pip-active';
              return `<div class="${cls}"></div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <div class="${cardClass}">
        <div class="card-stage-tag">
          <span class="stage-num">${stage + 1}/4</span>
          <span class="stage-label">${stageInfo.label}</span>
        </div>
        <div class="card-prompt-label">${stageInfo.prompt}</div>
        <div class="card-prompt-text ${stageInfo.kind === 'sentence' ? 'is-sentence' : ''}">${escapeHtml(promptText)}</div>
        <form class="card-form" id="answerForm">
          <input id="answerInput" class="card-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="${placeholder}" ${inputDisabled} value="${escapeHtml(study.inputValue)}" />
          ${submitBtn}
        </form>
        ${feedbackHtml}
      </div>
    </main>
  `;

  if (!study.feedback) {
    const inp = document.getElementById('answerInput');
    if (inp) {
      inp.focus();
      inp.oninput = e => { study.inputValue = e.target.value; };
    }
    const form = document.getElementById('answerForm');
    if (form) form.onsubmit = (e) => { e.preventDefault(); handleSubmit(targetText, stageInfo.kind, word.syn); };
  }
  const cont = document.getElementById('continueBtn');
  if (cont) {
    cont.onclick = () => {
      if (study.feedback === 'correct') handleContinueCorrect();
      else if (study.feedback === 'wrong') handleContinueWrong();
    };
  }
  const flag = document.getElementById('flagBtn');
  if (flag) {
    flag.onclick = handleFlag;
  }
  document.getElementById('exitBtn').onclick = () => {
    persist();
    renderHome();
  };
}

const CORRECT_MSGS = ['¡Correcto!', '¡Bien hecho!', '¡Perfecto!', '¡Estupendo!', '¡Genial!', '¡Eso es!', '¡Increíble!', '¡Ándale!'];
const WRONG_MSGS = ['¡Casi!', 'No exactamente.', 'Otra vez.', 'No, no.', '¡Inténtalo de nuevo!'];
function getCorrectMessage() { return CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)]; }
function getWrongMessage() { return WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)]; }

function handleSubmit(targetText, kind, synonyms) {
  if (study.feedback || !study.inputValue.trim()) return;
  const correct = isCorrect(study.inputValue, targetText, kind, synonyms || []);
  study.feedback = correct ? 'correct' : 'wrong';
  if (!correct) {
    study.showWrongDetails = true;
    study.lastWrongInput = study.inputValue;
    study.lastTarget = targetText;
    study.lastKind = kind;
    study.flaggedThisAttempt = false;
    // Track wrong count for this session
    state.thisSessionWrongs[study.currentEs] = (state.thisSessionWrongs[study.currentEs] || 0) + 1;
    persist();
  }
  renderStudy();
}

function handleFlag() {
  if (!study || study.feedback !== 'wrong' || study.flaggedThisAttempt) return;
  const input = (study.lastWrongInput || '').trim();
  const target = study.lastTarget;
  const kind = study.lastKind || 'word';
  if (!input || !target) return;

  // 1. Add to local userSynonyms so this answer is accepted from now on
  // We index synonyms under the normalized target.
  // For "x/y" targets we index under each alternate.
  const targetKeys = target.split(/[\/,]/).map(t => normalize(t.trim())).filter(Boolean);
  for (const k of targetKeys) {
    if (!state.userSynonyms[k]) state.userSynonyms[k] = [];
    if (!state.userSynonyms[k].includes(input)) state.userSynonyms[k].push(input);
  }

  // 2. Log for export
  const word = getWord(study.currentEs);
  state.flaggedLog.push({
    ts: new Date().toISOString(),
    session: state.session,
    es: study.currentEs,
    en: word ? word.en : '',
    kind,
    target,
    userAnswer: input,
  });

  study.flaggedThisAttempt = true;
  persist();
  renderStudy();
}

function handleContinueCorrect() {
  const es = study.currentEs;
  // Remove this stage from card's remaining
  study.stagesRemaining[es] = (study.stagesRemaining[es] || []).filter(s => s !== study.stage);
  if (study.stagesRemaining[es].length === 0) {
    delete study.stagesRemaining[es];
    completeCard(es);
  } else {
    // Re-insert into queue 1-3 ahead so stages interleave aggressively
    const insertAt = Math.min(study.queue.length, 1 + Math.floor(Math.random() * 3));
    study.queue.splice(insertAt, 0, es);
  }
  pickNext();
  renderStudy();
}

function handleContinueWrong() {
  const es = study.currentEs;
  // Wrong: reset all 4 stages for this card so they redo it
  study.stagesRemaining[es] = [0, 1, 2, 3];
  // Re-insert with delay 2-4 ahead
  const insertAt = Math.min(study.queue.length, 2 + Math.floor(Math.random() * 3));
  study.queue.splice(insertAt, 0, es);
  pickNext();
  renderStudy();
}

function completeCard(es) {
  // The card finished all 4 stages. Mark completed for the session.
  if (!state.todayCompleted.includes(es)) state.todayCompleted.push(es);

  // Update lastSessionReviewed
  if (state.cards[es]) {
    state.cards[es].lastSessionReviewed = state.session;
  }

  // Phrase unlock check
  const knownOrLearning = new Set(
    Object.values(state.cards)
      .filter(c => c.bucket === 'aprendidas' || c.bucket === 'aprendiendo')
      .map(c => c.es)
  );
  for (const phrase of PHRASES) {
    if (state.unlockedPhrases.includes(phrase.es)) continue;
    if (phrase.components.every(c => knownOrLearning.has(c))) {
      state.unlockedPhrases.push(phrase.es);
    }
  }
  persist();
}

// Apply bucket promotions/demotions at end of session
function applyEndOfSessionBucketChanges() {
  const promotions = { aprendidas: [], repaso: [], recovered: [] };
  for (const es of state.todayCompleted) {
    const card = state.cards[es];
    if (!card) continue;
    const wrongs = state.thisSessionWrongs[es] || 0;
    if (wrongs >= 2) {
      // Demote to repaso
      if (card.bucket !== 'repaso') promotions.repaso.push(es);
      card.bucket = 'repaso';
      card.cleanStreakSessions = 0;
    } else if (wrongs === 0) {
      // Clean session — increment streak, maybe promote
      card.cleanStreakSessions = (card.cleanStreakSessions || 0) + 1;
      if (card.bucket === 'repaso') {
        // Recovered from repaso → back to aprendiendo, streak counts from 1
        card.bucket = 'aprendiendo';
        card.cleanStreakSessions = 1;
        promotions.recovered.push(es);
      } else if (card.bucket !== 'aprendidas' && card.cleanStreakSessions >= 2) {
        card.bucket = 'aprendidas';
        promotions.aprendidas.push(es);
      }
    } else {
      // 1 wrong — reset streak but stay where they are
      card.cleanStreakSessions = 0;
    }
  }
  return promotions;
}

// ----- DONE -----
function renderDone() {
  const learnedToday = state.todayCompleted.length;
  const promotions = applyEndOfSessionBucketChanges();

  // Bump session
  state.session += 1;
  state.todayPack = [];
  state.todayCompleted = [];
  state.thisSessionWrongs = {};
  persist();
  study = null;

  const confetti = Array.from({length: 12}).map(() => '<span class="confetti"></span>').join('');

  if (promotions.repaso.length > 0) moves.push(`<div class="done-stat"><div class="done-stat-num done-stat-num-repaso">+${promotions.repaso.length}</div><div class="done-stat-label">→ Repaso</div></div>`);
  if (moves.length > 0) movementHtml = `<div class="done-stats">${moves.join('')}</div>`;

function renderBucket(bucket) {
  const cards = Object.values(state.cards).filter(c => c.bucket === bucket);
  const titles = {
    aprendidas: { es: 'Aprendidas', en: 'Learnt', sub: 'Palabras que has dominado.' },

  };
  const meta = titles[bucket];

  const revealed = new Set();

  function drawCards() {
    let cardsHtml;
    if (cards.length === 0) {
      const msgMap = {
        aprendidas: 'Aún no hay nada aquí. ¡Sigue practicando! 🌱',
        aprendiendo: 'Aún no hay nada aquí. ¡Empieza una sesión! 🌱',

    } else {

        const isRevealed = revealed.has(c.es);
        const word = getWord(c.es);
        const sEs = word && ((state.gender === 'fem' && word.sentenceEsF) ? word.sentenceEsF : word.sentenceEs);
        const sentenceHtml = isRevealed && word && sEs ? `

          <div class="bucket-card-cat">${escapeHtml(c.cat)}</div>
          <div class="bucket-card-es">${escapeHtml(c.es)}</div>
          <div class="bucket-card-en">${isRevealed ? escapeHtml(c.en) : 'tap to reveal'}</div>
          ${sentenceHtml}
        </div>`;
      }).join('')}</div>`;
    }

    root.innerHTML = `
      <main class="bucket">
        <button class="btn-link" id="backBtn">← Volver al inicio</button>

          <div class="bucket-eyebrow">${cards.length} palabra${cards.length !== 1 ? 's' : ''}</div>

// ============================================================================

function getPairProgress(id) {
  if (!state.confusiones[id]) {
    state.confusiones[id] = { active: false, history: [], total: 0 };
  }
  return state.confusiones[id];
}

function getPairAccuracy(id) {
  const p = getPairProgress(id);
  if (!p.history || p.history.length === 0) return null;
  const last10 = p.history.slice(-10);
  return last10.filter(Boolean).length / last10.length;
}

function getPairStatus(id) {
  const p = getPairProgress(id);
  if (!p.active) return 'inactive';
  const acc = getPairAccuracy(id);
  if (acc !== null && acc >= 0.85 && p.history.length >= 10) return 'confident';
  return 'active';
}

function recordConfusionAnswer(id, correct) {
  const p = getPairProgress(id);
  p.history.push(correct);
  if (p.history.length > 50) p.history.shift(); // cap at 50
  p.total = (p.total || 0) + 1;
  persist();
}

// Check answer for a confusion question
function isConfusionCorrect(input, answers) {
  const a = normalize(input);
  if (!a) return false;
  for (const ans of answers) {
    const t = normalize(ans);
    if (a === t) return true;
    if (levenshtein(a, t) <= 1) return true;
  }
  return false;
}

// ----- RENDER: Confusion study session -----
let confusionStudyState = null;

// pair = single CONFUSIONES object, OR null for mixed mode
// pairs = array of pairs (used only when pair is null)
function renderConfusionStudy(pair, pairs) {
  const isMixed = pair === null;
  const activePairs = isMixed ? pairs : [pair];
  const stateKey = isMixed ? '__mixed__' : pair.id;

  if (!confusionStudyState || confusionStudyState.stateKey !== stateKey) {
    // Build initial queue — for mixed mode, interleave all questions from all pairs
    let allQ = [];
    for (const p of activePairs) {
      allQ = allQ.concat(p.questions.map(q => ({ ...q, _pairId: p.id, _pairTitle: p.title })));
    }
    confusionStudyState = {
      stateKey,
      isMixed,
      activePairs,
      queue: shuffle(allQ),
      qIndex: 0,
      sessionCorrect: 0,
      sessionTotal: 0,
      feedback: null,
      input: '',
      currentQ: null,
    };
  }

  // Reshuffle when queue exhausted
  if (confusionStudyState.qIndex >= confusionStudyState.queue.length) {
    let allQ = [];
    for (const p of confusionStudyState.activePairs) {
      allQ = allQ.concat(p.questions.map(q => ({ ...q, _pairId: p.id, _pairTitle: p.title })));
    }
    confusionStudyState.queue = shuffle(allQ);
    confusionStudyState.qIndex = 0;
  }

  const q = confusionStudyState.queue[confusionStudyState.qIndex];
  confusionStudyState.currentQ = q;
  const fb = confusionStudyState.feedback;

  // For display: show pair title always (as a hint)
  const displayTitle = q._pairTitle || (pair ? pair.title : '');

  // Accuracy display
  let accStr;
  if (isMixed) {
    const tot = confusionStudyState.sessionTotal;
    accStr = tot > 0 ? `${Math.round(confusionStudyState.sessionCorrect / tot * 100)}% this session` : 'just starting';
  } else {
    const acc = getPairAccuracy(pair.id);
    accStr = acc !== null ? `${Math.round(acc * 100)}% accuracy` : 'just starting';
  }

  const sentenceHtml = escapeHtml(q.sentence).replace('___',
    `<span class="confusion-blank">${fb ? escapeHtml(fb.answer) : '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</span>`);

  let feedbackHtml = '';
  if (fb) {
    if (fb.correct) {
      feedbackHtml = `
        <div class="confusion-feedback">
          <div class="confusion-feedback-mark confusion-correct-mark">✓</div>
          <div class="confusion-feedback-text">${getCorrectMessage()}</div>
          <button class="btn-primary btn-small" id="confNextBtn">Siguiente →</button>
        </div>`;
    } else {
      feedbackHtml = `
        <div class="confusion-feedback">
          <div class="confusion-feedback-mark confusion-wrong-mark">✕</div>
          <div class="confusion-feedback-text">${getWrongMessage()}</div>
          <div class="confusion-hint">Answer: <strong>${escapeHtml(q.answers[0])}</strong> — ${escapeHtml(q.hint)}</div>
          <button class="btn-primary btn-small" id="confNextBtn">Siguiente →</button>
        </div>`;
    }
  }

  const cardClass = 'confusion-card-wrap' +
    (fb ? (fb.correct ? ' confusion-correct' : ' confusion-wrong') : '');

  const headerLabel = isMixed
    ? `<div class="confusion-pair-label" style="background:var(--terracotta)">Práctica mixta</div>
       <div class="confusion-pair-label">${escapeHtml(displayTitle)}</div>`
    : `<div class="confusion-pair-label">${escapeHtml(displayTitle)}</div>`;

  root.innerHTML = `
    <main class="confusion-study">
      <div class="confusion-study-header">
        <button class="btn-link" id="exitConfusion">← Salir</button>
        <div class="study-meta" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          ${headerLabel}
        </div>
        <div class="confusion-score">${confusionStudyState.sessionCorrect}/${confusionStudyState.sessionTotal} · ${accStr}</div>
      </div>

      <div class="${cardClass}">
        <div class="confusion-prompt-label">Fill in the blank</div>
        <div class="confusion-sentence">${sentenceHtml}</div>
        ${!fb ? `
          <form class="confusion-form" id="confForm">
            <input id="confInput" class="confusion-input" type="text"
              autocomplete="off" autocorrect="off" spellcheck="false"
              placeholder="escribe aquí…" value="${escapeHtml(confusionStudyState.input)}" />
            <button type="submit" class="confusion-submit">Check</button>
          </form>` : ''}
        ${feedbackHtml}
      </div>
    </main>
  `;

  document.getElementById('exitConfusion').onclick = () => {
    confusionStudyState = null;
    if (isMixed) renderConfusionesPage();
    else renderHome();
  };

  if (!fb) {
    const inp = document.getElementById('confInput');
    if (inp) {
      inp.focus();
      inp.oninput = e => { confusionStudyState.input = e.target.value; };
    }
    const form = document.getElementById('confForm');
    if (form) form.onsubmit = e => {
      e.preventDefault();
      handleConfusionSubmit(q);
    };
  }

  const nextBtn = document.getElementById('confNextBtn');
  if (nextBtn) nextBtn.onclick = () => handleConfusionNext(pair, pairs);
}

function handleConfusionSubmit(q) {
  const input = confusionStudyState.input;
  if (!input.trim()) return;
  const correct = isConfusionCorrect(input, q.answers);
  confusionStudyState.feedback = { correct, answer: input };
  confusionStudyState.sessionTotal++;
  if (correct) confusionStudyState.sessionCorrect++;
  // Always record against the specific pair, even in mixed mode
  if (q._pairId) recordConfusionAnswer(q._pairId, correct);
  renderConfusionStudy(
    confusionStudyState.isMixed ? null : confusionStudyState.activePairs[0],
    confusionStudyState.activePairs
  );
}

function handleConfusionNext(pair, pairs) {
  confusionStudyState.feedback = null;
  confusionStudyState.input = '';
  confusionStudyState.qIndex++;
  renderConfusionStudy(pair, pairs);
}

// ----- BOOT -----
renderHome();
updateSyncIndicator();
// Initial sync — adopt cloud if newer
syncDown();

</script>
</body>
</html>
